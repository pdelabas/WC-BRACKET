<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Bracket Predictor</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 240px;
        }
        .team-row.selected {
            background-color: #16a34a !important;
            color: #ffffff !important;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased">

    <header class="bg-gray-900 border-b border-gray-800 py-6 px-4 text-center">
        <h1 class="text-3xl font-extrabold text-emerald-400 tracking-wider uppercase">🏆 2026 World Cup Bracket Predictor 🏆</h1>
        <p class="text-gray-400 mt-2 text-sm">Click your winning teams to advance them through the tournament tree!</p>
    </header>

    <main class="p-4 space-y-8">
        
        <!-- Profile Identity Metadata (Mandatory) -->
        <div class="max-w-md mx-auto bg-gray-900 p-5 rounded-xl border border-gray-800 shadow-xl" id="profile-container">
            <label for="participant-name" class="block text-xs uppercase font-bold tracking-wider text-gray-400 mb-2">
                Your Name / Entry Handle: <span class="text-red-500">*Required</span>
            </label>
            <input type="text" id="participant-name" placeholder="Enter your name to unlock submission..." class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-emerald-500 font-semibold transition-colors">
        </div>

        <!-- Scrollable Bracket Tree Viewport -->
        <div class="overflow-x-auto pb-6">
            <div class="flex gap-8 justify-between items-stretch min-w-[1400px] px-4">
                
                <!-- 1. ROUND OF 32 COLUMN -->
                <div class="bracket-column space-y-3">
                    <h3 class="text-center font-black tracking-widest text-xs uppercase bg-gray-900 py-2 border border-gray-800 text-emerald-400 rounded">Round of 32</h3>
                    <div id="col-r32" class="space-y-4 flex flex-col justify-between h-full"></div>
                </div>

                <!-- 2. ROUND OF 16 COLUMN -->
                <div class="bracket-column space-y-3">
                    <h3 class="text-center font-black tracking-widest text-xs uppercase bg-gray-900 py-2 border border-gray-800 text-emerald-400 rounded">Round of 16</h3>
                    <div id="col-r16" class="space-y-8 flex flex-col justify-around h-full"></div>
                </div>

                <!-- 3. QUARTERFINALS COLUMN -->
                <div class="bracket-column space-y-3">
                    <h3 class="text-center font-black tracking-widest text-xs uppercase bg-gray-900 py-2 border border-gray-800 text-emerald-400 rounded">Quarterfinals</h3>
                    <div id="col-qf" class="space-y-16 flex flex-col justify-around h-full"></div>
                </div>

                <!-- 4. SEMIFINALS COLUMN -->
                <div class="bracket-column space-y-3">
                    <h3 class="text-center font-black tracking-widest text-xs uppercase bg-gray-900 py-2 border border-gray-800 text-emerald-400 rounded">Semifinals</h3>
                    <div id="col-sf" class="space-y-24 flex flex-col justify-around h-full"></div>
                </div>

                <!-- 5. GRAND FINAL CHAMPIONSHIP STAGE -->
                <div class="bracket-column space-y-3 max-w-xs justify-center">
                    <h3 class="text-center font-black tracking-widest text-xs uppercase bg-gradient-to-r from-amber-500 to-yellow-500 py-2 text-gray-950 rounded">World Cup Final</h3>
                    <div id="col-final" class="py-4"></div>
                    <div class="bg-gray-900 border-2 border-amber-500/40 p-4 rounded-xl text-center space-y-2 shadow-2xl">
                        <span class="text-[10px] uppercase tracking-widest font-black text-amber-400 block">Predicted Champion</span>
                        <div id="champ-crown" class="text-xl font-black text-yellow-300 tracking-wide">—</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- INTERACTIVE SUBMISSION PANEL -->
        <section class="max-w-xl mx-auto bg-gray-900 p-6 rounded-xl border border-gray-800 text-center space-y-4 shadow-2xl">
            <h4 class="text-sm font-bold uppercase tracking-wider text-gray-300">Submit Your Predictions</h4>
            
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <button id="download-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-6 py-3 rounded-lg shadow transition-all cursor-pointer text-sm uppercase tracking-wider flex items-center justify-center gap-2">
                    💾 Download Selection JSON
                </button>
            </div>
        </section>
    </main>

    <script>
        const initialMatchups = [
            { id: 'm1', t1: '🇩🇪 Germany', t2: '🇵🇾 Paraguay' },
            { id: 'm2', t1: '🇫🇷 France', t2: '🇸🇪 Sweden' },
            { id: 'm3', t1: '🇿🇦 South Africa', t2: '🇨🇦 Canada' },
            { id: 'm4', t1: '🇳🇱 Netherlands', t2: '🇲🇦 Morocco' },
            { id: 'm5', t1: '🇵🇹 Portugal', t2: '🇭🇷 Croatia' },
            { id: 'm6', t1: '🇪🇸 Spain', t2: '🇦🇹 Austria' },
            { id: 'm7', t1: '🇺🇸 United States', t2: '🇧🇦 Bosnia & Herz.' },
            { id: 'm8', t1: '🇧🇪 Belgium', t2: '🇸🇳 Senegal' },
            { id: 'm9', t1: '🇧🇷 Brazil', t2: '🇯🇵 Japan' },
            { id: 'm10', t1: '🇨🇮 Côte d\'Ivoire', t2: '🇳🇴 Norway' },
            { id: 'm11', t1: '🇲🇽 Mexico', t2: '🇪🇨 Ecuador' },
            { id: 'm12', t1: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 England', t2: '🇨🇩 DR Congo' },
            { id: 'm13', t1: '🇦🇷 Argentina', t2: '🇨🇻 Cabo Verde' },
            { id: 'm14', t1: '🇦🇺 Australia', t2: '🇪🇬 Egypt' },
            { id: 'm15', t1: '🇨🇭 Switzerland', t2: '🇩🇿 Algeria' },
            { id: 'm16', t1: '🇨🇴 Colombia', t2: '🇬🇭 Ghana' }
        ];

        const progressionMap = {
            'm1': { target: 'r16_1', slot: 't1' }, 'm2': { target: 'r16_1', slot: 't2' },
            'm3': { target: 'r16_2', slot: 't1' }, 'm4': { target: 'r16_2', slot: 't2' },
            'm5': { target: 'r16_3', slot: 't1' }, 'm6': { target: 'r16_3', slot: 't2' },
            'm7': { target: 'r16_4', slot: 't1' }, 'm8': { target: 'r16_4', slot: 't2' },
            'm9': { target: 'r16_5', slot: 't1' }, 'm10': { target: 'r16_5', slot: 't2' },
            'm11': { target: 'r16_6', slot: 't1' }, 'm12': { target: 'r16_6', slot: 't2' },
            'm13': { target: 'r16_7', slot: 't1' }, 'm14': { target: 'r16_7', slot: 't2' },
            'm15': { target: 'r16_8', slot: 't1' }, 'm16': { target: 'r16_8', slot: 't2' },

            'r16_1': { target: 'qf_1', slot: 't1' }, 'r16_2': { target: 'qf_1', slot: 't2' },
            'r16_3': { target: 'qf_2', slot: 't1' }, 'r16_4': { target: 'qf_2', slot: 't2' },
            'r16_5': { target: 'qf_3', slot: 't1' }, 'r16_6': { target: 'qf_3', slot: 't2' },
            'r16_7': { target: 'qf_4', slot: 't1' }, 'r16_8': { target: 'qf_4', slot: 't2' },

            'qf_1': { target: 'sf_1', slot: 't1' }, 'qf_2': { target: 'sf_1', slot: 't2' },
            'qf_3': { target: 'sf_2', slot: 't1' }, 'qf_4': { target: 'sf_2', slot: 't2' },

            'sf_1': { target: 'final_1', slot: 't1' }, 'sf_2': { target: 'final_1', slot: 't2' }
        };

        const bracketState = { r32: {}, r16: {}, qf: {}, sf: {}, final: {} };

        function makeMatchCardUI(id, t1, t2, label, stage) {
            return `
                <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden shadow-lg text-xs w-full" id="card-${id}">
                    <div class="bg-gray-800 border-b border-gray-800 text-gray-400 font-bold px-2 py-1 text-[10px] uppercase tracking-tight">${label}</div>
                    <div class="divide-y divide-gray-850">
                        <div class="team-row p-2 flex items-center justify-between cursor-pointer hover:bg-gray-800 select-none transition-all" onclick="pickWinner('${id}', 't1', '${stage}')" id="${id}-t1-row">
                            <span id="${id}-t1-name" class="font-medium tracking-wide">${t1}</span>
                        </div>
                        <div class="team-row p-2 flex items-center justify-between cursor-pointer hover:bg-gray-800 select-none transition-all" onclick="pickWinner('${id}', 't2', '${stage}')" id="${id}-t2-row">
                            <span id="${id}-t2-name" class="font-medium tracking-wide">${t2}</span>
                        </div>
                    </div>
                </div>`;
        }

        function initTree() {
            const r32Col = document.getElementById('col-r32');
            initialMatchups.forEach((m, idx) => {
                r32Col.insertAdjacentHTML('beforeend', makeMatchCardUI(m.id, m.t1, m.t2, `Match ${idx+1}`, 'r32'));
                bracketState.r32[m.id] = { t1: m.t1, t2: m.t2, winner: null };
            });

            const r16Col = document.getElementById('col-r16');
            for(let i=1; i<=8; i++) {
                r16Col.insertAdjacentHTML('beforeend', makeMatchCardUI(`r16_${i}`, '—', '—', `R16 Match ${i}`, 'r16'));
                bracketState.r16[`r16_${i}`] = { t1: '—', t2: '—', winner: null };
            }

            const qfCol = document.getElementById('col-qf');
            for(let i=1; i<=4; i++) {
                qfCol.insertAdjacentHTML('beforeend', makeMatchCardUI(`qf_${i}`, '—', '—', `Quarter ${i}`, 'qf'));
                bracketState.qf[`qf_${i}`] = { t1: '—', t2: '—', winner: null };
            }

            const sfCol = document.getElementById('col-sf');
            for(let i=1; i<=2; i++) {
                sfCol.insertAdjacentHTML('beforeend', makeMatchCardUI(`sf_${i}`, '—', '—', `Semi ${i}`, 'sf'));
                bracketState.sf[`sf_${i}`] = { t1: '—', t2: '—', winner: null };
            }

            document.getElementById('col-final').innerHTML = makeMatchCardUI('final_1', '—', '—', 'Grand Championship Match', 'final');
            bracketState.final['final_1'] = { t1: '—', t2: '—', winner: null };
        }

        window.pickWinner = function(matchId, pickSlot, stage) {
            const match = bracketState[stage][matchId];
            const chosenTeam = pickSlot === 't1' ? match.t1 : match.t2;
            
            if (!chosenTeam || chosenTeam === '—') return;

            match.winner = chosenTeam;

            document.getElementById(`${matchId}-t1-row`).classList.remove('selected');
            document.getElementById(`${matchId}-t2-row`).classList.remove('selected');
            document.getElementById(`${matchId}-${pickSlot}-row`).classList.add('selected');

            if (matchId === 'final_1') {
                document.getElementById('champ-crown').innerText = chosenTeam;
                return;
            }

            const transition = progressionMap[matchId];
            if (transition) {
                clearDownstreamTree(transition.target);
                const nextStage = transition.target.split('_')[0];
                bracketState[nextStage][transition.target][transition.slot] = chosenTeam;
                document.getElementById(`${transition.target}-${transition.slot}-name`).innerText = chosenTeam;
            }
        }

        function clearDownstreamTree(targetId) {
            let currentTarget = targetId;
            while(currentTarget) {
                const stage = currentTarget.split('_')[0];
                const match = bracketState[stage][currentTarget];
                if(match) {
                    match.winner = null;
                    document.getElementById(`${currentTarget}-t1-row`).classList.remove('selected');
                    document.getElementById(`${currentTarget}-t2-row`).classList.remove('selected');
                }
                
                const next = progressionMap[currentTarget];
                if(next) {
                    bracketState[next.target.split('_')[0]][next.target][next.slot] = '—';
                    document.getElementById(`${next.target}-${next.slot}-name`).innerText = '—';
                    currentTarget = next.target;
                } else {
                    if (currentTarget === 'final_1') {
                        document.getElementById('champ-crown').innerText = '—';
                    }
                    currentTarget = null;
                }
            }
        }

        function createPayload(name) {
            return {
                player: name,
                roundOf16: Object.values(bracketState.r16).map(m => [m.t1, m.t2]).flat().filter(t => t !== '—'),
                quarterfinals: Object.values(bracketState.qf).map(m => [m.t1, m.t2]).flat().filter(t => t !== '—'),
                semifinals: Object.values(bracketState.sf).map(m => [m.t1, m.t2]).flat().filter(t => t !== '—'),
                finalists: [bracketState.final.final_1.t1, bracketState.final.final_1.t2].filter(t => t !== '—'),
                champion: bracketState.final.final_1.winner || "Not Finalized"
            };
        }

        // Handle JSON Download Event with Mandatory Checks
        document.getElementById('download-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('participant-name');
            const name = nameInput.value.trim();
            const profileBox = document.getElementById('profile-container');

            // Validation Guard: Ensure name field is completed
            if (!name) {
                alert("🛑 Name Required! Please enter your name at the top of the page before downloading your bracket.");
                profileBox.classList.remove('border-gray-800');
                profileBox.classList.add('border-red-500', 'bg-red-950/20');
                nameInput.focus();
                return;
            }

            // Reset boundary warnings if valid
            profileBox.classList.remove('border-red-500', 'bg-red-950/20');
            profileBox.classList.add('border-gray-800');

            const payload = createPayload(name);
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
            
            // Format dynamic filename (e.g., bracket_oliver.json)
            const sanitizedName = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
            const downloadAnchor = document.createElement('a');
            
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `bracket_${sanitizedName}.json`);
            document.body.appendChild(downloadAnchor);
            
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        initTree();
    </script>
</body>
</html>
